version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: aura-postgres
    environment:
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_password
      POSTGRES_DB: aura
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura_user"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: